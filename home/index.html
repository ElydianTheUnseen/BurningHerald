<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Burning Herald</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #0b0a08;
      --bg-sepia: #1a140f;
      --accent: #f97316;
      --accent-soft: #ffb067;
      --text-main: #f5f5f4;
      --text-muted: #c2b6a6;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #1a140f, #0b0a08 70%);
      color: var(--text-main);

      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(11, 10, 8, 0.7);
      backdrop-filter: blur(8px);
      z-index: 10;
      box-sizing: border-box;
    }

    /* BRAND AS HOME BUTTON (ANIMATED) */
    .brand {
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      letter-spacing: 1px;
      color: var(--accent-soft);
      text-decoration: none;
      white-space: nowrap;
      transition: transform 0.25s ease, color 0.25s ease, text-shadow 0.25s ease;
      position: relative;
    }

    .brand:hover {
      color: var(--accent);
      transform: scale(1.05);
      text-shadow: 0 0 12px rgba(249, 115, 22, 0.35);
    }

    .brand::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 100%;
      height: 1px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
      opacity: 0.7;
    }

    .brand:hover::after {
      transform: scaleX(1);
    }

    /* NAV FIX (NO CROPPING) */
    nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 20px;
      max-width: 75%;
    }

    nav a {
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.95rem;
      white-space: nowrap;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: var(--accent);
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      position: relative;
      flex: 1;
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 60%;
      height: 60%;
      background: url('Burning Herald logo design.png') no-repeat center;
      background-size: contain;
      opacity: 0.05;
      z-index: 0;
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .logo {
      width: 260px;
      max-width: 70%;
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 2.8rem;
      letter-spacing: 2px;
      margin: 0;
    }

    .tagline {
      margin-top: 10px;
      font-size: 1.2rem;
      color: var(--text-muted);
    }

    /* BUTTON */
    .btn {
      margin-top: 30px;
      padding: 14px 28px;
      font-size: 1rem;
      background: linear-gradient(135deg, #f97316, #ea580c);
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 5px 20px rgba(249, 115, 22, 0.3);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(249, 115, 22, 0.5);
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 40px;
      font-size: 0.9rem;
      color: var(--text-muted);
      border-top: 1px solid rgba(255,255,255,0.05);
      margin-top: auto;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      header {
        padding: 15px 20px;
      }

      nav {
        gap: 12px;
      }

      nav a {
        font-size: 0.85rem;
      }

      h1 {
        font-size: 2rem;
      }

      .logo {
        width: 200px;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <a class="brand" href="/home">Burning Herald</a>

    <nav>
      <a href="/our-games">Our Games</a>
      <a href="/our-mission">Our Mission</a>
      <a href="/our-policies">Policies</a>
    </nav>
  </header>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-content">
      <img src="Burning Herald NO NAME.png" alt="Burning Herald Logo" class="logo">
      <h1>Burning Herald</h1>
      <p class="tagline">Your Summoning Awaits.</p>
      <button class="btn">Notify Me</button>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    © 2026 Burning Herald. All rights reserved.
  </footer>

</body>
</html>
