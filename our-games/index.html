<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Burning Herald</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- GLOBAL STYLES -->
  <link rel="stylesheet" href="../styles.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <a class="brand" href="/home">Burning Herald</a>

    <nav>
      <a href="/our-games">Our Games</a>
      <a href="/our-mission">Our Mission</a>
      <a href="/our-policies">Policies</a>
    </nav>
  </header>

  <!-- HERO -->
  <div class="hero">
    <h1>Our Games</h1>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <h2>Our Games</h2>

    <!-- JSON WILL RENDER HERE -->
    <div id="games-container"></div>
  </div>

  <!-- FOOTER -->
  <footer>
    © 2026 Burning Herald. All rights reserved.
  </footer>

  <!-- JSON LOADER SCRIPT -->
  <script>
    fetch('/content/games.json')
      .then(response => response.json())
      .then(data => {
        const container = document.getElementById('games-container');

        data.games.forEach(game => {
          const card = document.createElement('div');
          card.className = 'game-card';

          card.innerHTML = `
            <h3>${game.title}</h3>
            <p>${game.description}</p>
            <span>${game.status}</span>
          `;

          container.appendChild(card);
        });
      })
      .catch(err => {
        document.getElementById('games-container').innerHTML =
          '<p>Failed to load games data.</p>';
        console.error('Error loading games.json:', err);
      });
  </script>

</body>
</html>
