<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Burning Herald</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    p {
      opacity: 0.8;
      font-size: 1.2rem;
    }
    .btn {
      margin-top: 20px;
      padding: 12px 24px;
      background: #f97316;
      border: none;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 6px;
    }
    .btn:hover {
      background: #ea580c;
    }
  </style>
</head>
<body>
  <div>
    <h1>Burning Herald</h1>
    <p>Your signal is coming soon.</p>
    <button class="btn">Notify Me</button>
  </div>
</body>
</html>
