<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Burning Herald</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Background logo (subtle) */
    body::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 60%;
      height: 60%;
      transform: translate(-50%, -50%);
      background: url('Burning Herald logo design.png') no-repeat center;
      background-size: contain;
      opacity: 0.08;
      z-index: 0;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      max-width: 300px; /* adjust size as needed */
      width: 80%;
      height: auto;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
      font-size: 1.2rem;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 24px;
      background: #f97316;
      border: none;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 6px;
    }

    .btn:hover {
      background: #ea580c;
    }
  </style>
</head>
<body>
  <div class="content">
    <img src="Burning Herald logo design.png" alt="Burning Herald Logo" class="logo">
    <p>Your Summoning Awaits.</p>
    <button class="btn">Notify Me</button>
  </div>
</body>
</html>
